services:
  - type: web
    name: levelup-ai-backend
    env: node
    plan: free
    buildCommand: cd src && npm install
    startCommand: cd src && npm start
    healthCheckPath: /
    regions:
      - oregon
    envVars:
      - key: ANTHROPIC_API_KEY
        scope: runtime
        sync: false
      - key: NODE_ENV
        value: production
